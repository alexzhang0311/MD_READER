{% extends "base.html" %}
{% block title %}KYC 知识库{% endblock %}

{% block head %}
<link rel="stylesheet" href="/api/pygments.css">
<style>
    /* ── Layout ── */
    .app-header {
        background: #fff; border-bottom: 1px solid var(--border);
        padding: 0 24px; height: 56px;
        display: flex; align-items: center; justify-content: space-between;
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .app-header .logo {
        font-size: 18px; font-weight: 600; color: var(--primary);
        display: flex; align-items: center; gap: 8px;
    }
    .app-header .user-info {
        display: flex; align-items: center; gap: 14px; font-size: 14px;
    }
    .app-header .user-info .username {
        color: var(--text-light);
    }
    .app-header .user-info .btn-logout {
        padding: 6px 16px; background: transparent;
        border: 1px solid var(--border); border-radius: var(--radius);
        cursor: pointer; font-size: 13px; color: var(--text-light);
        transition: all 0.2s;
    }
    .app-header .user-info .btn-logout:hover {
        border-color: var(--danger); color: var(--danger);
    }

    .app-container {
        display: flex; margin-top: 56px; height: calc(100vh - 56px);
    }

    /* ── Sidebar ── */
    .sidebar {
        width: 300px; min-width: 300px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
        overflow: hidden;
    }
    .sidebar-header {
        padding: 16px; border-bottom: 1px solid var(--border);
    }
    .search-box {
        width: 100%; padding: 8px 12px;
        border: 1px solid var(--border); border-radius: var(--radius);
        font-size: 14px;
    }
    .search-box:focus {
        outline: none; border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(74,144,217,0.12);
    }
    .file-tree {
        flex: 1; overflow-y: auto; padding: 8px 0;
    }

    /* Tree items */
    .tree-item {
        cursor: pointer; user-select: none;
    }
    .tree-label {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 16px; font-size: 14px;
        transition: background 0.15s;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tree-label:hover { background: #f0f4f8; }
    .tree-label.active { background: #e3edf7; color: var(--primary); font-weight: 500; }
    .tree-label .icon { font-size: 16px; flex-shrink: 0; }
    .tree-children { display: none; }
    .tree-item.open > .tree-children { display: block; }
    .tree-children .tree-label { padding-left: 32px; }
    .tree-children .tree-children .tree-label { padding-left: 48px; }
    .tree-children .tree-children .tree-children .tree-label { padding-left: 64px; }

    /* ── Content Area ── */
    .content {
        flex: 1; overflow-y: auto; background: var(--bg);
        display: flex; flex-direction: column;
    }

    .content-placeholder {
        flex: 1; display: flex; align-items: center; justify-content: center;
        color: var(--text-light); font-size: 16px;
        flex-direction: column; gap: 12px;
    }
    .content-placeholder .big-icon { font-size: 64px; opacity: 0.3; }

    .content-header {
        padding: 16px 32px; background: #fff;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
    }
    .content-actions {
        display: flex; align-items: center; gap: 12px;
    }
    .content-header h2 {
        font-size: 18px; font-weight: 600;
        display: flex; align-items: center; gap: 8px;
    }
    .content-header .breadcrumb {
        font-size: 13px; color: var(--text-light);
    }
    .btn-download {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 8px 14px; border: 1px solid var(--border);
        border-radius: var(--radius); background: #fff;
        color: var(--text); font-size: 13px; cursor: pointer;
        transition: all 0.2s ease;
    }
    .btn-download:hover {
        color: var(--primary); border-color: var(--primary);
        background: #f7fbff; text-decoration: none;
    }

    .markdown-body {
        padding: 32px; max-width: 900px; flex: 1;
    }

    /* ── Markdown Styles ── */
    .markdown-body h1 { font-size: 2em; margin: 0.67em 0; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .markdown-body h2 { font-size: 1.5em; margin: 0.83em 0; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
    .markdown-body h3 { font-size: 1.25em; margin: 1em 0; }
    .markdown-body h4 { font-size: 1em; margin: 1em 0; }
    .markdown-body p  { margin: 0.8em 0; }
    .markdown-body ul, .markdown-body ol { margin: 0.8em 0; padding-left: 2em; }
    .markdown-body li { margin: 0.3em 0; }
    .markdown-body blockquote {
        margin: 1em 0; padding: 0.5em 1em;
        border-left: 4px solid var(--primary);
        background: #f6f8fa; color: var(--text-light);
    }
    .markdown-body code {
        background: #f0f2f5; padding: 2px 6px;
        border-radius: 4px; font-size: 0.9em;
        font-family: "Fira Code", "Cascadia Code", Consolas, monospace;
    }
    .markdown-body pre {
        background: #282a36; color: #f8f8f2;
        border-radius: var(--radius); padding: 16px;
        overflow-x: auto; margin: 1em 0;
    }
    .markdown-body pre code {
        background: none; padding: 0; color: inherit;
    }
    .markdown-body table {
        border-collapse: collapse; margin: 1em 0; width: 100%;
    }
    .markdown-body th, .markdown-body td {
        border: 1px solid var(--border); padding: 8px 12px; text-align: left;
    }
    .markdown-body th { background: #f6f8fa; font-weight: 600; }
    .markdown-body img { max-width: 100%; border-radius: var(--radius); }
    .markdown-body hr { border: none; border-top: 2px solid var(--border); margin: 2em 0; }
    .markdown-body a { color: var(--primary); }
    .markdown-body a:hover { text-decoration: underline; }

    /* Code highlight override */
    .codehilite { border-radius: var(--radius); margin: 1em 0; }
    .codehilite pre { margin: 0; }

    /* ── Loading ── */
    .loading {
        display: flex; align-items: center; justify-content: center;
        padding: 60px; color: var(--text-light);
    }
    .spinner {
        width: 24px; height: 24px; border: 3px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%; animation: spin 0.8s linear infinite;
        margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    .sidebar-toggle {
        display: none; background: none; border: none;
        font-size: 22px; cursor: pointer; padding: 4px 8px;
    }
    @media (max-width: 768px) {
        .sidebar { position: fixed; left: -300px; top: 56px; bottom: 0; z-index: 99; transition: left 0.3s; }
        .sidebar.show { left: 0; box-shadow: 4px 0 16px rgba(0,0,0,0.1); }
        .sidebar-toggle { display: block; }
    }
</style>
{% endblock %}

{% block body %}
<header class="app-header">
    <div style="display:flex;align-items:center;gap:12px;">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <div class="logo">📖 KYC 知识库</div>
    </div>
    <div class="user-info">
        <span class="username">👤 {{ current_user.username }}</span>
        <button class="btn-logout" onclick="location.href='/logout'">退出登录</button>
    </div>
</header>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索文件..." oninput="filterTree()">
        </div>
        <div class="file-tree" id="fileTree">
            <div class="loading"><div class="spinner"></div>加载中...</div>
        </div>
    </aside>

    <main class="content" id="content">
        <div class="content-placeholder" id="placeholder">
            <div class="big-icon">📄</div>
            <div>请从左侧选择一个 Markdown 文件开始阅读</div>
        </div>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    let fileData = [];
    let currentPath = null;

    // ── Load file tree ──
    async function loadFileTree() {
        try {
            const resp = await fetch('/api/files');
            if (!resp.ok) throw new Error('加载失败');
            fileData = await resp.json();
            renderTree(fileData);
        } catch(e) {
            document.getElementById('fileTree').innerHTML =
                '<div style="padding:20px;color:var(--danger);text-align:center;">加载文件列表失败</div>';
        }
    }

    function renderTree(items, container) {
        container = container || document.getElementById('fileTree');
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-light);">暂无 Markdown 文件</div>';
            return;
        }
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'tree-item';
            div.dataset.name = item.name.toLowerCase();

            const label = document.createElement('div');
            label.className = 'tree-label';

            if (item.type === 'directory') {
                label.innerHTML = '<span class="icon">📁</span>' + escapeHtml(item.name);
                label.onclick = (e) => {
                    e.stopPropagation();
                    div.classList.toggle('open');
                    label.querySelector('.icon').textContent = div.classList.contains('open') ? '📂' : '📁';
                };
                div.appendChild(label);

                const children = document.createElement('div');
                children.className = 'tree-children';
                renderTree(item.children, children);
                div.appendChild(children);
            } else {
                label.innerHTML = '<span class="icon">📄</span>' + escapeHtml(item.name);
                label.dataset.path = item.path;
                label.onclick = (e) => {
                    e.stopPropagation();
                    loadFile(item.path, label);
                };
                div.appendChild(label);
            }

            container.appendChild(div);
        });
    }

    // ── Load file content ──
    async function loadFile(path, labelEl) {
        if (currentPath === path) return;
        currentPath = path;

        // Highlight active
        document.querySelectorAll('.tree-label.active').forEach(el => el.classList.remove('active'));
        if (labelEl) labelEl.classList.add('active');

        const content = document.getElementById('content');
        content.innerHTML = '<div class="loading"><div class="spinner"></div>正在加载文件...</div>';

        try {
            const resp = await fetch('/api/read?path=' + encodeURIComponent(path));
            if (!resp.ok) throw new Error('读取失败');
            const data = await resp.json();

            content.innerHTML = `
                <div class="content-header">
                    <h2><span>📄</span> ${escapeHtml(data.filename)}</h2>
                    <div class="content-actions">
                        <span class="breadcrumb">${escapeHtml(data.path)}</span>
                        <button class="btn-download" type="button" onclick="downloadFile(${JSON.stringify(path)})">
                            <span>⬇</span>
                            <span>下载</span>
                        </button>
                    </div>
                </div>
                <div class="markdown-body">${data.html}</div>
            `;
        } catch(e) {
            content.innerHTML = `
                <div class="content-placeholder">
                    <div class="big-icon">❌</div>
                    <div>读取文件失败，请重试</div>
                </div>`;
            currentPath = null;
        }

        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('show');
        }
    }

    // ── Search / Filter ──
    window.filterTree = function() {
        const query = document.getElementById('searchBox').value.toLowerCase().trim();
        document.querySelectorAll('.tree-item').forEach(item => {
            if (!query) {
                item.style.display = '';
                return;
            }
            const name = item.dataset.name || '';
            const match = name.includes(query);
            const hasMatchChild = item.querySelector('.tree-item:not([style*="display: none"])');
            item.style.display = (match || hasMatchChild) ? '' : 'none';
            if (match && item.querySelector('.tree-children')) {
                item.classList.add('open');
            }
        });
        // Two passes needed for parent visibility
        document.querySelectorAll('.tree-item').forEach(item => {
            if (item.style.display === 'none') {
                const visibleChild = item.querySelector('.tree-item:not([style*="display: none"])');
                if (visibleChild) item.style.display = '';
            }
        });
    };

    // ── Mobile sidebar toggle ──
    window.toggleSidebar = function() {
        document.getElementById('sidebar').classList.toggle('show');
    };

    window.downloadFile = function(path) {
        if (!path) return;
        window.location.href = '/api/download?path=' + encodeURIComponent(path);
    };

    // ── Util ──
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ── Init ──
    loadFileTree();
})();
</script>
{% endblock %}
