{% extends "base.html" %}
{% block title %}注册 - Markdown 阅读器{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>📖 创建账户</h1>
        <p class="subtitle">注册一个新账户</p>
        <form method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required>
            </div>
            <div class="form-group">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" name="confirm" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary">注 册</button>
        </form>
        <div class="auth-footer">
            已有账户？<a href="{{ url_for('login') }}">返回登录</a>
        </div>
    </div>
</div>
{% endblock %}
